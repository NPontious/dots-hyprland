# Don't print a new line at the start of the prompt
add_newline = false
# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols В оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’ 
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—
# Cool stuff у°ңҘ о©ұ пҒӢ пҖҚ

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory${custom.prompt_separator}${custom.nix_shell_pill}([оӮ¶](bold fg:252)$git_branch$git_status$git_metrics[оӮҙ](bold fg:252) )
  $character"""

[fill]
symbol = '-'
style = 'fg:245'

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[о©ұ пҒӢ](bold fg:243)"
error_symbol = "[пҖҚ пҒӢ](bold fg:244)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "fg:235 bg:252"
symbol = "у°ҳ¬ "
truncation_length = 12
truncation_symbol = ""
format = "[$symbol$branch(:$remote_branch)]($style)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
style = "fg:235 bg:252"
format = "([ $all_status$ahead_behind]($style))"
conflicted = "рҹҸі "
ahead = "рҹҸҺрҹ’Ё "
behind = "рҹҳ° "
diverged = "рҹҳө "
untracked = "рҹӨ· "
stashed = "рҹ“Ұ "
modified = "рҹ“қ "
staged = '[++\($count\)](green bg:252)'
renamed = "вңҚпёҸ "
deleted = "рҹ—‘ "

[git_metrics]
disabled = false
added_style = "bold green bg:252"
deleted_style = "bold red bg:252"
format = "( [+$added]($added_style)/[-$deleted]($deleted_style))"

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:252 bold fg:235)[оӮҙ](bold fg:252)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:252 fg:235"
style_root = "red bold"
format = "[оӮ¶](bold fg:252)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:255 fg:240"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:255)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:255)'


[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[custom.prompt_separator]
command = 'echo "у°ңҘ"'
when = 'test -n "$IN_NIX_SHELL" || git rev-parse --is-inside-work-tree 2>/dev/null'
style = "bold fg:243"
format = " [$output]($style) "

[custom.nix_shell_pill]
command = 'echo "пҢ“"'
when = 'test -n "$IN_NIX_SHELL"'
format = '[оӮ¶](bold fg:252)[$output](fg:235 bg:252)[оӮҙ](bold fg:252) '

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:252)[у°Әў $duration](bold bg:252 fg:235)[оӮҙ](bold fg:252)'
