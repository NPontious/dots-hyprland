# Don't print a new line at the start of the prompt
add_newline = false
# Pipes â•°â”€ â•­â”€
# Powerline symbols آ î‚° î‚± î‚² î‚³ î‚´ î‚µ î‚¶ î‚· î‚¸ î‚¹ î‚؛ î‚» î‚¼ î‚½ î‚¾ î‚؟ îƒ€ îƒپ îƒ‚ îƒƒ îƒ„ îƒ… îƒ† îƒ‡ îƒˆ îƒٹ  îƒŒ îƒچ îƒژ îƒڈ îƒگ îƒ‘ îƒ” îƒ’ 
# Wedges ًں­§ًں­’ ًں­£ًں­§ًں­“
# Random noise ًں¬–ًں¬¥ًں¬”ًں¬—
# Cool stuff َ°œ¥ î©± ïپ‹ ï€چ

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory${custom.prompt_separator}${custom.nix_shell_pill}([î‚¶](bold fg:252)$git_branch$git_status$git_metrics[î‚´](bold fg:252) )
  $character"""

[fill]
symbol = '-'
style = 'fg:245'

# Replace the "â‌¯" symbol in the prompt with "â‍œ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[î©± ïپ‹](bold fg:243)"
error_symbol = "[ï€چ ïپ‹](bold fg:244)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "fg:235 bg:252"
symbol = "َ°ک¬ "
truncation_length = 12
truncation_symbol = ""
format = "[$symbol$branch(:$remote_branch)]($style)"

[git_commit]
commit_hash_length = 4
tag_symbol = "ï’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[îœ§ PICKING](bold red)"

[git_status]
style = "fg:235 bg:252"
format = "([ $all_status$ahead_behind]($style))"
conflicted = "َ°…° "
ahead = "َ°¶£ "
behind = "َ°¶، "
diverged = "َ°¹¹ "
untracked = "َ°™” "
stashed = "َ°—“ "
modified = "َ°ڈ¬ "
staged = '[َ°گ—\($count\) ](green bg:252)'
renamed = "َ°‘• "
deleted = "َ°چ´ "

[git_metrics]
disabled = false
added_style = "bold green bg:252"
deleted_style = "bold red bg:252"
format = "([ +$added]($added_style)[/](fg:235 bg:252)[-$deleted]($deleted_style))"

[hostname]
ssh_only = false
format =  "[â€¢$hostname](bg:252 bold fg:235)[î‚´](bold fg:252)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'ًں•™[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:252 fg:235"
style_root = "red bold"
format = "[î‚¶](bold fg:252)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "ï‘­ "
read_only = " ï‘– "
style = "bg:255 fg:240"
truncation_length = 2
truncation_symbol = ".../"
format = '[î‚¶](bold fg:255)[َ°‰‹ â†’ $path]($style)[î‚´](bold fg:255)'


[directory.substitutions]
"Desktop" = " ï’© "
"Documents" = " ï’¥ "
"Downloads" = " ïگ‰ "
"Music" = " َ°ژˆ "
"Pictures" = " ïگڈ "
"Videos" = " ï”¬ "
"GitHub" = " َ°ٹ¤ "

[custom.prompt_separator]
command = 'echo "َ°œ¥"'
when = 'test -n "$IN_NIX_SHELL" || git rev-parse --is-inside-work-tree 2>/dev/null'
style = "bold fg:243"
format = " [$output]($style) "

[custom.nix_shell_pill]
command = 'echo "ïŒ“"'
when = 'test -n "$IN_NIX_SHELL"'
format = '[î‚¶](bold fg:252)[ $output ](bold fg:235 bg:252)[î‚´](bold fg:252) '

[cmd_duration]
min_time = 0
format = '[î‚¶](bold fg:252)[َ°ھ¢ $duration](bold bg:252 fg:235)[î‚´](bold fg:252)'
